<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="flex.css">
    <title>Document</title>
</head>
<body>
    <!--a container div (thais contains all the contents of your site) lets you limit the width of your site, and style the site separate from the body-->
    <div class="container">
    <header>
    <!-- There should be one h1 tag per HTML page-->
        <h1>CSS Flexbox</h1>
    </header>
    <nav>
        <!--Using a ul for navigation gives you more elements to style, and more flexibility when doing responsive design-->
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Stuff</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <main>
        <div>One</div>
        <div>Two - this is the second div with a lot of extra content</div>
        <div>Three</div>
        <div>Four</div>
        <div>Five</div>
    </main>

    <footer>
        <div class="footnav">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Stuff</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        </div>
        <div class="copy">
            <p>&copy;my stuff 2026</p>
        </div>
        <div class="Contact">
            <p>Contact me here:</p>
            <input type="text">
        </div>
    </footer>

    </div>
</body>
</html>
